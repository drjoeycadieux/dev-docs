# Netlify configuration for faang-dev-learning

[build]
  # Directory to publish (relative to base)
  publish = "dist"
  
  # Command to build the project
  # Run build from the subfolder containing the site
  base = "faang-dev-learning"
  command = "npm run build"

# Environment variables for production
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--production=false"

# Production context specific settings
[context.production]
  command = "npm run build"
  publish = "dist"
  
  [context.production.environment]
    VITE_APP_ENV = "production"

# Deploy preview context
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"
  
  [context.deploy-preview.environment]
    VITE_APP_ENV = "preview"

# Branch deploy context
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA redirect rule for Vue Router - only apply to non-existing files
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
